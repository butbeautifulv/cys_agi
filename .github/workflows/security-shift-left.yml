name: Security Shift Left

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  security-gates:
    uses: ./.github/workflows/security-gates.yml
    secrets: inherit
    with:
      security_policy: config/security-gate-policy-adopt.yaml
      enable_real_linters: true
