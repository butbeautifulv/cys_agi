name: Security Shift Left

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

env:
  SECURITY_POLICY: config/security-gate-policy-adopt.yaml
  ENABLE_REAL_LINTERS: "true"

jobs:
  secrets:
    uses: ./.github/workflows/jobs/secret-scan.yml
    secrets: inherit
