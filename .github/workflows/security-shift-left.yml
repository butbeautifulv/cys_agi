name: Security Shift Left

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  secrets:
    uses: ./.github/workflows/jobs/secret-scan.yml
    secrets: inherit
    with:
      security_policy: config/security-gate-policy-adopt.yaml
