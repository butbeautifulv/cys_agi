name: Secret Scan

on:
  workflow_call:
    inputs:
      security_policy:
        required: false
        type: string
        default: config/security-gate-policy-adopt.yaml

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Gate check
        if: always()
        run: |
          REPORT=""
          for f in gitleaks-report.json results.sarif; do
            [ -f "$f" ] && REPORT="$f" && break
          done
          [ -n "$REPORT" ] || echo '{"runs":[{"results":[]}]}' > gitleaks-report.json
          [ -n "$REPORT" ] || REPORT=gitleaks-report.json
          python scripts/gate-check.py --control secrets --report "$REPORT" --policy "${{ inputs.security_policy }}"
