apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "egregore.fullname" . }}-migrate
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uv", "run", "egregore", "migrate"]
          envFrom:
            - configMapRef:
                name: {{ include "egregore.fullname" . }}-env
            - secretRef:
                name: {{ include "egregore.fullname" . }}-secrets
