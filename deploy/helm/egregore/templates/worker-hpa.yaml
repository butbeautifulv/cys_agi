{{- if gt (.Values.worker.replicas | int) 1 }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: egregore-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: egregore-worker
  minReplicas: {{ .Values.worker.replicas }}
  maxReplicas: {{ add (.Values.worker.replicas | int) 4 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
{{- end }}
