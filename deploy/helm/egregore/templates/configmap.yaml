apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "egregore.fullname" . }}-env
  labels:
    {{- include "egregore.labels" . | nindent 4 }}
data:
  STAGE: {{ .Values.env.stage | quote }}
  USE_MEMORY_FALLBACK: {{ .Values.env.useMemoryFallback | quote }}
  USE_QDRANT: {{ .Values.env.useQdrant | quote }}
  AUTH_ENABLED: {{ .Values.env.authEnabled | quote }}
  OTEL_ENABLED: {{ .Values.env.otelEnabled | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  REDIS_HOST: {{ .Values.redis.host | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  QDRANT_URL: {{ .Values.qdrant.url | quote }}
  VEIL_MCP_URL: {{ .Values.veil.mcpUrl | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- if .Values.langfuse.host }}
  LANGFUSE_HOST: {{ .Values.langfuse.host | quote }}
  {{- end }}
  K8S_NAMESPACE: {{ .Release.Namespace | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "egregore.fullname" . }}-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
