global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cxado-dev
    env: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: egregore-api
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: egregore-api
          platform: egregore
          component: ingress

  - job_name: egregore-tool-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8092"]
        labels:
          service: egregore-tool-gateway
          platform: egregore
          component: gateway

  - job_name: veil-api
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          service: veil-api
          platform: veil
          component: graph-api

  - job_name: veil-mcp
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["host.docker.internal:8091"]
        labels:
          service: veil-mcp
          platform: veil
          component: mcp

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
          component: tracing

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
          component: observability
